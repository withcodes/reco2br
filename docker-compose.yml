version: '3.8'

services:
  backend:
    build: ./backend
    container_name: gstsync-backend
    ports:
      - "3001:8080"
    environment:
      - PORT=8080
      - DATA_DIR=/app/data
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - gstsync-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:3001
    container_name: gstsync-frontend
    ports:
      - "5173:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  gstsync-data:
    driver: local
